name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make scripts executable
        run: chmod +x gradlew scripts/*.sh

      - name: Build release package
        run: ./scripts/build-release.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: List release files
        run: ls -la build/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: StudySync ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'BETA') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
          files: |
            build/release/studysync-linux.tar.gz
            build/release/studysync-linux.tar.gz.sha256
            build/release/studysync-*-linux.tar.gz
            build/release/studysync-*-linux.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}